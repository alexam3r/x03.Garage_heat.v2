# Интеграция garage-heat-v2 с Home Assistant через MQTT (без MQTT Discovery,
# статическая конфигурация).
#
# Предполагается, что интеграция MQTT (подключение к брокеру) в HA уже
# настроена — через UI (Settings -> Devices & services -> MQTT) или через
# YAML в другом месте. Этот файл описывает только сущности garage-heat-v2,
# без брокера.
#
# Файл уже содержит top-level ключ `mqtt:` (обязательно) — если top-level
# ключи файла (sensor:/switch:/...) не обёрнуты в `mqtt:` при подключении, HA
# провалидирует их по устаревшей platform-based схеме (`platform: mqtt` в
# каждой записи), которой тут нет, и откажет с ошибкой "required key
# 'platform' not provided".
#
# Подключение — через packages (безопасно даже если `mqtt:` уже используется
# где-то ещё в вашей конфигурации, HA сливает несколько блоков `mqtt:` из
# разных packages в один):
#
#   homeassistant:
#     packages:
#       garage_heat: !include homeassistant/garage_heat.yaml
#
# Схема топиков (CLAUDE.md §4): единого JSON-статуса нет — каждая величина
# публикуется в свой собственный топик. У управляемых величин — пара
# `.../set` (команда, подписка устройства) и `.../state` (подтверждённое
# устройством значение, публикация с retain, обновляется сразу по приёму
# команды и раз в минуту как heartbeat). У чисто телеметрийных величин
# (сенсоры, физическое состояние выходов, диагностика) — только `.../state`.
# Полезное следствие: значения публикуются как простой текст (не JSON), а
# булевы — буквально как "ON"/"OFF", поэтому ниже почти не нужны
# value_template (раньше значения приходилось доставать из общего JSON и
# разбираться с тем, что ArduinoJson сериализует bool как Python "True"/
# "False" при обращении через value_json — этой проблемы больше нет).
#
# Топики и семантика — CLAUDE.md §2/§4, README.md разделы «Управление» и
# «Логика регулирования: нюансы поведения» в репозитории прошивки.
#
# retain: true на командных топиках нужен, чтобы после ESP.restart() (ручного
# или по watchdog) устройство при переподписке получило от брокера последнее
# заданное значение, а не сбросилось к дефолтам из config.h.
#
# Якоря `device`/`availability` определены прямо на полях первой сущности ниже
# (а не отдельным ключом на верхнем уровне) — потому что HA провалидирует
# только ожидаемые для mqtt: ключи (sensor/binary_sensor/switch/number/button
# и т.п.); произвольный сторонний ключ типа `device:` на этом уровне будет
# отклонён валидацией конфигурации.
mqtt:
  sensor:
    - name: "Температура обдува пушки (BLOWN_AIR)"
      unique_id: garage_heat_blown_air_temp
      state_topic: "garage/heat/blownAirTemp/state"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      availability: &availability
        - topic: "garage/heat/state"
          payload_available: "ON"
          payload_not_available: "OFF"
      device: &device
        identifiers:
          - garage_heat_v2
        name: "Гараж — отопление"
        manufacturer: "DIY"
        model: "garage-heat-v2 (ESP8266 / Wemos D1 mini)"

    - name: "Температура хранения (TARGET)"
      unique_id: garage_heat_target_temp
      state_topic: "garage/heat/targetTemp/state"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      availability: *availability
      device: *device

    - name: "Температура (доп. датчик INFO)"
      unique_id: garage_heat_info_temp
      state_topic: "garage/heat/infoTemp/state"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      availability: *availability
      device: *device

    - name: "Уличная температура"
      unique_id: garage_heat_outdoor_temp
      state_topic: "garage/heat/outdoorTemp/state"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      availability: *availability
      device: *device

    - name: "Температура радиатора SSR"
      unique_id: garage_heat_radiator_temp
      state_topic: "garage/heat/radiatorTemp/state"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      availability: *availability
      device: *device

    - name: "Авария радиатора"
      unique_id: garage_heat_radiator_alarm
      state_topic: "garage/heat/radiatorAlarm/state"
      icon: mdi:alert-octagon-outline
      availability: *availability
      device: *device

    - name: "Гистерезис таргета хранения"
      unique_id: garage_heat_target_hysteresis
      state_topic: "garage/heat/targetHysteresis/state"
      unit_of_measurement: "°C"
      entity_category: diagnostic
      icon: mdi:delta
      availability: *availability
      device: *device

    - name: "Гистерезис таргета вспом. нагревателя"
      unique_id: garage_heat_aux_hysteresis
      state_topic: "garage/heat/auxHysteresis/state"
      unit_of_measurement: "°C"
      entity_category: diagnostic
      icon: mdi:delta
      availability: *availability
      device: *device

    - name: "Аптайм"
      unique_id: garage_heat_uptime
      state_topic: "garage/heat/uptimeSeconds/state"
      device_class: duration
      unit_of_measurement: "s"
      entity_category: diagnostic
      icon: mdi:timer-outline
      availability: *availability
      device: *device

    - name: "Свободная память (heap)"
      unique_id: garage_heat_free_heap
      state_topic: "garage/heat/freeHeapBytes/state"
      unit_of_measurement: "B"
      entity_category: diagnostic
      icon: mdi:memory
      availability: *availability
      device: *device

    - name: "Уровень сигнала WiFi"
      unique_id: garage_heat_rssi
      state_topic: "garage/heat/rssiDbm/state"
      device_class: signal_strength
      unit_of_measurement: "dBm"
      state_class: measurement
      entity_category: diagnostic
      availability: *availability
      device: *device

  binary_sensor:
    - name: "Вентилятор тепловой пушки (D5)"
      unique_id: garage_heat_fan_on
      state_topic: "garage/heat/fanOn/state"
      icon: mdi:fan
      availability: *availability
      device: *device

    - name: "Нагревательный элемент пушки (D6)"
      unique_id: garage_heat_element_on
      state_topic: "garage/heat/elementOn/state"
      device_class: heat
      availability: *availability
      device: *device

    - name: "Вспомогательный нагреватель, физическое состояние (D7)"
      unique_id: garage_heat_aux_on
      state_topic: "garage/heat/auxOn/state"
      device_class: heat
      availability: *availability
      device: *device

    - name: "Вентилятор охлаждения радиатора (D8)"
      unique_id: garage_heat_radiator_fan_on
      state_topic: "garage/heat/radiatorFanOn/state"
      icon: mdi:fan-alert
      availability: *availability
      device: *device

    - name: "Авария радиатора (проблема)"
      unique_id: garage_heat_radiator_problem
      state_topic: "garage/heat/radiatorAlarm/state"
      value_template: "{{ 'ON' if value != 'NORMAL' else 'OFF' }}"
      device_class: problem
      availability: *availability
      device: *device

    - name: "WiFi подключен"
      unique_id: garage_heat_wifi_connected
      state_topic: "garage/heat/wifiConnected/state"
      device_class: connectivity
      entity_category: diagnostic
      availability: *availability
      device: *device

    - name: "MQTT подключен"
      unique_id: garage_heat_mqtt_connected
      state_topic: "garage/heat/mqttConnected/state"
      device_class: connectivity
      entity_category: diagnostic
      availability: *availability
      device: *device

  switch:
    - name: "Тепловая пушка"
      unique_id: garage_heat_fan_heater_switch
      command_topic: "garage/heat/fanHeater/set"
      state_topic: "garage/heat/fanHeater/state"
      retain: true
      icon: mdi:air-conditioner
      availability: *availability
      device: *device

    - name: "Вспомогательный нагреватель (calorifer)"
      unique_id: garage_heat_calorifer_switch
      command_topic: "garage/heat/calorifer/set"
      state_topic: "garage/heat/calorifer/state"
      retain: true
      icon: mdi:radiator
      availability: *availability
      device: *device

  number:
    - name: "Целевая температура хранения"
      unique_id: garage_heat_target_sensor_temp_number
      command_topic: "garage/heat/targetSensorTemp/set"
      state_topic: "garage/heat/targetSensorTemp/state"
      retain: true
      min: -10
      max: 30
      step: 0.5
      unit_of_measurement: "°C"
      device_class: temperature
      mode: box
      availability: *availability
      device: *device

    - name: "Порог адаптации duty-цикла (sensorTempDiff)"
      unique_id: garage_heat_sensor_temp_diff_number
      command_topic: "garage/heat/sensorTempDiff/set"
      state_topic: "garage/heat/sensorTempDiff/state"
      retain: true
      min: 5
      max: 50
      step: 1
      unit_of_measurement: "°C"
      icon: mdi:thermometer-lines
      mode: box
      availability: *availability
      device: *device

    - name: "Целевая температура воздуха (calorifer)"
      unique_id: garage_heat_target_air_temp_number
      command_topic: "garage/heat/targetAirTemp/set"
      state_topic: "garage/heat/targetAirTemp/state"
      retain: true
      min: -20
      max: 20
      step: 0.5
      unit_of_measurement: "°C"
      device_class: temperature
      mode: box
      availability: *availability
      device: *device

  button:
    - name: "Перезагрузка устройства"
      unique_id: garage_heat_restart_button
      command_topic: "garage/heat/restart/set"
      payload_press: "1"
      device_class: restart
      entity_category: config
      availability: *availability
      device: *device
