[platformio]
default_envs = esp8266

[env]
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
lib_deps =
    ${env.lib_deps}
    knolleary/PubSubClient @ ^2.8
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.7

[env:native]
platform = native
lib_deps =
    ${env.lib_deps}
