; Отдельный мини-проект PlatformIO — НЕ часть основной прошивки garage-heat-v2.
; Запускать из этого каталога: `pio run -t upload -t monitor`.
; См. README.md рядом с этим файлом.

[env:esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
lib_deps =
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.7
